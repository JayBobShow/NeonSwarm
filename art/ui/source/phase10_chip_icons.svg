    <path class="thin" d="M32 20 L44 45 H20 Z"/>
  </g>
  <g id="mine" transform="translate(384,0)">
    <circle class="icon" cx="32" cy="32" r="20"/>
    <path class="thin" d="M7 32 H57 M32 7 V57 M15 15 L49 49 M49 15 L15 49"/>
    <circle class="fill" cx="32" cy="32" r="4"/>
