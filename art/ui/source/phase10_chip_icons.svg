<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="448" height="64" viewBox="0 0 448 64" version="1.1">
  <defs>
    <filter id="neon-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .icon { fill: none; stroke: #ffffff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; filter: url(#neon-glow); }
      .thin { fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: url(#neon-glow); opacity: 0.86; }
      .fill { fill: #ffffff; filter: url(#neon-glow); opacity: 0.92; }
    </style>
  </defs>
  <g id="diamond" transform="translate(0,0)">
    <path class="icon" d="M32 8 L56 32 L32 56 L8 32 Z"/>
    <path class="thin" d="M20 32 H44 M32 20 V44"/>
  </g>
  <g id="bolt" transform="translate(64,0)">
    <path class="icon" d="M35 5 L14 34 H30 L25 59 L50 25 H34 Z"/>
    <path class="thin" d="M42 8 L28 28"/>
  </g>
  <g id="speed" transform="translate(128,0)">
    <path class="icon" d="M10 47 L53 16"/>
    <path class="thin" d="M11 32 L42 10"/>
    <path class="thin" d="M18 56 L56 29"/>
  </g>
  <g id="pickup" transform="translate(192,0)">
    <path class="icon" d="M32 7 L55 32 L32 57 L9 32 Z"/>
    <path class="thin" d="M20 32 H44 M32 20 V44"/>
    <circle class="thin" cx="32" cy="32" r="17"/>
  </g>
  <g id="ring" transform="translate(256,0)">
