<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <filter id="cyanGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="magentaGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .glass { fill: rgba(0, 8, 24, 0.74); }
      .cyan { fill: none; stroke: #00f0ff; stroke-width: 4; filter: url(#cyanGlow); }
      .magenta { fill: none; stroke: #ff0bdc; stroke-width: 3; filter: url(#magentaGlow); }
      .thin { fill: none; stroke: rgba(255,255,255,0.68); stroke-width: 1.25; }
      .label { fill: #d8fbff; font-family: sans-serif; font-size: 18px; letter-spacing: 2px; }
      .note { fill: #ffdb2d; font-family: sans-serif; font-size: 14px; letter-spacing: 1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="#02030a"/>
